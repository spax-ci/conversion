<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
    <title>Conversion des unités de masse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container vh-100 d-flex justify-content-center align-items-center">
    
    <div class="card shadow w-100" style="max-width: 800px;">
        <div class="card-body">

           <h5 class="text-center fw-bold text-uppercase text-muted"> <img src="images/logo.png" alt="Logo" style="height: 50px; margin-right: 10px;">Convertisseur des unités de masse</h5>

            <p class="sousTitre text-center">
                <i class="fa fa-info-circle me-2 text-muted" aria-hidden="true"></i>Veuillez entrer la valeur et sélectionner les unités pour la conversion
            </p>

            <p class="mt-3 text-center d-none alert alert-success" role="alert">
                Voici le résultat de la conversion: 
                <span class="text-danger" id="resultatConversion">3.5</span>
            </p>

            <p class="mt-3 text-center d-none alert alert-danger" id="errorConversion" role="alert"></p>

            <!-- Formulaire -->
            <form class="mt-4" id="formConversion">
                <div class="row g-3">

                    <div class="col-md-3 col-12">
                        <input type="number" class="form-control" id="valeur" min="0" placeholder="Entrer un nombre">
                    </div>

                    <div class="col-md-4 col-12">
                        <select class="form-select">
                            <option value="">Sélectionner une unité</option>
                            <option value="t">Tonne</option>
                            <option value="q">Quintal</option>
                            <option value="kg">Kilogramme</option>
                            <option value="hg">Hectogramme</option>
                            <option value="dag">Décagramme</option>
                            <option value="g">Gramme</option>
                            <option value="dg">Décigramme</option>
                            <option value="cg">Centigramme</option>
                            <option value="mg">Milligramme</option>
                        </select>
                    </div>

                    <div class="col-md-1 col-12 d-flex align-items-center convert justify-content-center">
                        <p class="mb-0"><i class="fa fa-long-arrow-right" aria-hidden="true"></i></p>
                    </div>

                    <div class="col-md-4 col-12">
                        <select class="form-select">
                            <option value="">Sélectionner une unité</option>
                            <option value="t">Tonne</option>
                            <option value="q">Quintal</option>
                            <option value="kg">Kilogramme</option>
                            <option value="hg">Hectogramme</option>
                            <option value="dag">Décagramme</option>
                            <option value="g">Gramme</option>
                            <option value="dg">Décigramme</option>
                            <option value="cg">Centigramme</option>
                            <option value="mg">Milligramme</option>
                        </select>
                    </div>

                </div>
                <div class="text-center mt-3" id="loader"><i class="fa fa-spinner fa-spin text-muted" aria-hidden="true"></i></div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-light w-100 btn-outline-dark"><i class="fa fa-sync me-2" aria-hidden="true"></i>Convertir</button>
                </div>
                <div class="text-end mt-2">
                    <small class="text-muted">Powered by <span> <a href="https://www.spax.ci" class="text-decoration-none" target="_blank">SPAX</a></span></small>
                </div>
            </form>

        </div>
    </div>

</div>
    <!--Lier le fichier JS au fichier HTML-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
</body>
</html>
